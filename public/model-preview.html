<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>本地 3D 模型预览</title>
    <link rel="stylesheet" href="/model-preview.css" />
  </head>
  <body>
    <div class="preview-page">
      <aside class="sidebar">
        <div class="topbar">
          <div>
            <h1>本地 3D 模型预览</h1>
          </div>
          <a class="toplink" href="/">返回生成页</a>
        </div>

        <p class="lead">
          支持 GLB、GLTF、FBX、OBJ、STL。上传本地模型文件后，可以直接在浏览器中进行旋转、缩放和平移预览。
        </p>

        <label class="upload-card" id="upload-card" for="model-files">
          <input
            id="model-files"
            type="file"
            multiple
            accept=".glb,.gltf,.fbx,.obj,.stl,.bin,.mtl,.jpg,.jpeg,.png,.webp"
          />
          <strong>选择模型文件</strong>
          <span>拖拽文件到这里，或点击选择</span>
          <small>主模型格式支持：.glb .gltf .fbx .obj .stl</small>
        </label>

        <div class="field">
          <label for="entry-file">主模型文件</label>
          <select id="entry-file" disabled>
            <option value="">请先选择模型文件</option>
          </select>
        </div>

        <div class="field-grid">
          <div class="field">
            <label for="theme-select">背景主题</label>
            <select id="theme-select">
              <option value="warm" selected>暖光工作台</option>
              <option value="studio">明亮摄影棚</option>
              <option value="dark">深色展示台</option>
            </select>
          </div>
          <div class="field">
            <label for="light-range">灯光强度</label>
            <div class="range-wrap">
              <input id="light-range" type="range" min="0.6" max="2.6" step="0.1" value="1.4" />
              <span id="light-value">1.4x</span>
            </div>
          </div>
        </div>

        <div class="actions">
          <button id="load-model" class="primary-btn" disabled>加载预览</button>
          <button id="reset-camera" class="ghost-btn" type="button">重置视角</button>
          <button id="toggle-autorotate" class="ghost-btn" type="button">自动旋转：关</button>
          <button id="toggle-wireframe" class="ghost-btn" type="button">线框模式：关</button>
          <button id="toggle-grid" class="ghost-btn" type="button">地面网格：开</button>
          <button id="toggle-fullscreen" class="ghost-btn" type="button">全屏查看</button>
          <button id="export-image" class="ghost-btn wide" type="button">导出 PNG</button>
        </div>

        <div class="info-grid">
          <div class="info-card">
            <span>状态</span>
            <strong id="status-text">等待上传</strong>
          </div>
          <div class="info-card">
            <span>文件数</span>
            <strong id="file-count">0</strong>
          </div>
          <div class="info-card">
            <span>格式</span>
            <strong id="format-stat">-</strong>
          </div>
          <div class="info-card">
            <span>网格数</span>
            <strong id="mesh-stat">-</strong>
          </div>
          <div class="info-card">
            <span>三角面</span>
            <strong id="triangle-stat">-</strong>
          </div>
          <div class="info-card">
            <span>顶点数</span>
            <strong id="vertex-stat">-</strong>
          </div>
          <div class="info-card">
            <span>动画数</span>
            <strong id="animation-stat">0</strong>
          </div>
          <div class="info-card">
            <span>尺寸</span>
            <strong id="size-stat">-</strong>
          </div>
        </div>

        <div class="field">
          <label>已上传文件</label>
          <ul id="file-list" class="file-list">
            <li>暂未选择文件</li>
          </ul>
        </div>

        <div class="field">
          <label>最近打开</label>
          <ul id="recent-list" class="file-list recent-list">
            <li>还没有历史记录</li>
          </ul>
        </div>

        <div class="tips">
          <p>左键拖动：旋转模型</p>
          <p>滚轮：缩放</p>
          <p>右键拖动：平移</p>
          <p>如果是 OBJ 或 GLTF，请把对应的 .mtl、.bin 和贴图文件一起上传。</p>
        </div>
      </aside>

      <main class="viewer-shell" id="viewer-shell">
        <div id="viewer" class="viewer"></div>
        <div class="viewer-overlay top">
          <span id="model-name">尚未加载模型</span>
        </div>
        <div class="viewer-overlay bottom">
          <span id="model-meta">上传本地模型文件后，即可在浏览器中预览。</span>
        </div>
      </main>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "/vendor/three/build/three.module.js",
          "three/addons/": "/vendor/three/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="/model-preview.js"></script>
  </body>
</html>
