<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KMAX 管理后台</title>
    <link rel="stylesheet" href="/model-setting.css" />
  </head>
  <body>
    <div class="admin-shell">
      <header class="admin-topbar">
        <a class="brand" href="/">
          <span>KMAX 管理后台</span>
        </a>
        <div class="topbar-user">
          <button id="admin-user-menu-trigger" class="user-menu-trigger" type="button" aria-label="用户信息">
            <span class="user-avatar">A</span>
          </button>
          <div id="admin-user-menu-panel" class="user-menu-panel hidden">
            <div class="user-menu-info">
              <strong class="user-name">admin</strong>
              <span id="admin-user-role">管理员</span>
              <span id="admin-user-credit-text">积分 0</span>
            </div>
            <a class="user-menu-item" href="/model-preview.html" target="_blank" rel="noopener">模型预览</a>
            <a class="user-menu-item" href="/model-work.html" target="_blank" rel="noopener">用户中心</a>
            <button class="user-menu-item" id="admin-logout" type="button">退出登录</button>
          </div>
        </div>
      </header>

      <div class="admin-layout">
        <aside class="admin-sidebar" aria-label="平台管理菜单">
          <button class="nav-item active" type="button" data-view="settings">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M4 5.5h16M4 12h16M4 18.5h16" />
                <path d="M8 3.5v4M15 10v4M11 16.5v4" />
              </svg>
            </span>
            <span>平台配置</span>
          </button>
          <button class="nav-item" type="button" data-view="assets">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M12 3.5 19.4 8v8L12 20.5 4.6 16V8L12 3.5Z" />
                <path d="M12 12 19.1 8M12 12 4.9 8M12 12v8" />
              </svg>
            </span>
            <span>模型管理</span>
          </button>
          <button class="nav-item" type="button" data-view="users">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M9.5 11.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
                <path d="M3.5 19c.6-3.1 2.8-4.9 6-4.9s5.4 1.8 6 4.9" />
                <path d="M17 7.5h3.5M18.8 5.8v3.5" />
              </svg>
            </span>
            <span>用户管理</span>
          </button>
          <button class="nav-item" type="button" data-view="credits">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M12 3.5v17" />
                <path d="M7 7.5h7a3 3 0 0 1 0 6H9a3 3 0 0 0 0 6h8" />
              </svg>
            </span>
            <span>积分管理</span>
          </button>
        </aside>

        <main class="admin-main">
          <section class="workspace-head">
            <div>
              <h1 id="view-title">平台配置</h1>
              <p id="view-description">统一管理 3D 模型生成平台和公共模型版本。</p>
            </div>
            <div class="head-actions">
              <select id="provider-filter" class="control-select hidden" aria-label="平台筛选">
                <option value="all">全部平台</option>
                <option value="tripo">Tripo3D</option>
                <option value="meshy">Meshy</option>
              </select>
              <label class="search-box hidden" id="admin-search-wrap">
                <span aria-hidden="true">⌕</span>
                <input id="admin-search" type="search" placeholder="输入搜索关键词" />
              </label>
              <button id="refresh-view" class="icon-btn hidden" type="button" title="刷新" aria-label="刷新">↻</button>
              <button id="create-user" class="primary-btn compact-btn hidden" type="button">新增用户</button>
              <button id="create-credit" class="primary-btn compact-btn hidden" type="button">新增积分记录</button>
            </div>
          </section>

          <section id="settings-view" class="admin-view">
            <div class="content-panel settings-panel">
              <div class="section-title">
                <span>Generator Config</span>
                <h2>公共生成配置</h2>
                <p>保存后，模型播放器提交的新任务会使用这份公共平台配置。</p>
              </div>

              <form id="generator-settings-form" class="settings-form">
                <label class="form-field">
                  <span>生成平台</span>
                  <select id="settings-provider" name="provider"></select>
                </label>

                <label class="form-field">
                  <span>模型版本</span>
                  <select id="settings-model-version" name="modelVersion"></select>
                </label>

                <div id="settings-runtime-note" class="runtime-note"></div>

                <div class="form-actions">
                  <button id="save-settings" class="primary-btn" type="submit">保存公共配置</button>
                </div>
              </form>

              <div id="settings-feedback" class="feedback hidden" aria-live="polite"></div>
            </div>
          </section>

          <section id="assets-view" class="admin-view hidden">
            <div class="table-panel">
              <div class="table-summary">
                <strong id="asset-total">0</strong>
                <span>个生成任务</span>
              </div>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>任务</th>
                      <th>平台</th>
                      <th>状态</th>
                      <th>进度</th>
                      <th>更新时间</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody id="asset-table-body"></tbody>
                </table>
              </div>
              <p id="asset-empty" class="empty-state hidden">暂无模型生成任务。打开模型播放器提交生成任务后，这里会显示资源列表。</p>
            </div>
          </section>

          <section id="users-view" class="admin-view hidden">
            <div class="table-panel">
              <div class="table-summary">
                <strong id="user-total">0</strong>
                <span>个后台用户</span>
              </div>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>用户</th>
                      <th>角色</th>
                      <th>3D模型空间</th>
                      <th>状态</th>
                      <th>更新时间</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody id="user-table-body"></tbody>
                </table>
              </div>
              <p id="user-empty" class="empty-state hidden">暂无后台用户。</p>
            </div>
          </section>
          <section id="credits-view" class="admin-view hidden">
            <div class="table-panel">
              <div class="table-summary">
                <strong id="credit-total">0</strong>
                <span>条积分记录</span>
              </div>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>用户</th>
                      <th>变动</th>
                      <th>余额</th>
                      <th>说明</th>
                      <th>时间</th>
                    </tr>
                  </thead>
                  <tbody id="credit-table-body"></tbody>
                </table>
              </div>
              <p id="credit-empty" class="empty-state hidden">暂无积分记录。</p>
            </div>
          </section>
        </main>
      </div>

      <div id="user-dialog" class="dialog-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="user-dialog-title">
        <form id="user-form" class="dialog-panel">
          <div class="dialog-head">
            <h2 id="user-dialog-title">新增用户</h2>
            <button id="close-user-dialog" class="icon-btn" type="button" aria-label="关闭">×</button>
          </div>
          <input id="user-id" type="hidden" />
          <label class="form-field">
            <span>用户名</span>
            <input id="user-username" name="username" autocomplete="off" required placeholder="例如 zhangsan" />
          </label>
          <label class="form-field">
            <span>姓名</span>
            <input id="user-display-name" name="displayName" autocomplete="off" placeholder="用于后台显示" />
          </label>
          <label class="form-field">
            <span>角色</span>
            <select id="user-role" name="role">
              <option value="admin">管理员</option>
              <option value="user">普通用户</option>
            </select>
          </label>
          <label class="form-field">
            <span>3D模型空间（GB）</span>
            <input id="user-model-storage-quota" name="modelStorageQuotaGb" type="number" min="1" max="1024" step="0.1" placeholder="默认 10" />
          </label>
          <label class="form-field">
            <span>密码</span>
            <input id="user-password" name="password" type="password" autocomplete="new-password" placeholder="新增必填，修改时留空则不变" />
          </label>
          <label class="check-field">
            <input id="user-disabled" name="disabled" type="checkbox" />
            <span>禁用该用户</span>
          </label>
          <div id="user-feedback" class="feedback hidden" aria-live="polite"></div>
          <div class="dialog-actions">
            <button id="cancel-user" class="secondary-btn" type="button">取消</button>
            <button id="save-user" class="primary-btn" type="submit">保存</button>
          </div>
        </form>
      </div>

      <div id="credit-dialog" class="dialog-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="credit-dialog-title">
        <form id="credit-form" class="dialog-panel">
          <div class="dialog-head">
            <h2 id="credit-dialog-title">新增积分记录</h2>
            <button id="close-credit-dialog" class="icon-btn" type="button" aria-label="关闭">×</button>
          </div>
          <label class="form-field">
            <span>用户</span>
            <div id="credit-selected-user" class="selected-user-card hidden"></div>
            <input id="credit-user-search" class="credit-user-search" type="search" autocomplete="off" placeholder="搜索用户名或姓名" />
            <div id="credit-user-options" class="credit-user-options" role="listbox"></div>
            <select id="credit-user" class="hidden" required></select>
          </label>
          <label class="form-field">
            <span>积分类型</span>
            <select id="credit-type" required>
              <option value="marketing_gift">营销赠送</option>
              <option value="manual_deduct">人工扣除</option>
            </select>
          </label>
          <label class="form-field">
            <span>积分变动</span>
            <input id="credit-amount" type="number" step="1" required placeholder="正数充值，负数扣除" />
          </label>
          <label class="form-field">
            <span>说明</span>
            <input id="credit-note" autocomplete="off" placeholder="例如：活动充值 / 人工扣除" />
          </label>
          <div id="credit-feedback" class="feedback hidden" aria-live="polite"></div>
          <div class="dialog-actions">
            <button id="cancel-credit" class="secondary-btn" type="button">取消</button>
            <button id="save-credit" class="primary-btn" type="submit">保存</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="/model-setting.js"></script>
  </body>
</html>
